version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fraud-api

    ports:
      - "5001:5001"

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: fraud-dashboard

    ports:
      - "8501:8501"

    depends_on:
      - api